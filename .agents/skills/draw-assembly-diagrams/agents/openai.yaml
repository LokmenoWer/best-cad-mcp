interface:
  display_name: "Assembly Drawing CAD"
  short_description: "Draw complete assembly drawings step by step with best-cad-mcp"
  default_prompt: "Use $draw-assembly-diagrams to create a standards-aware AutoCAD assembly drawing step by step with best-cad-mcp."

dependencies:
  tools:
    - type: "mcp"
      value: "best-cad-mcp"
      description: "AutoCAD MCP server with drawing, query, annotation, BOM/table, block, dimension, hatch, layout, and export tools."

policy:
  allow_implicit_invocation: true
