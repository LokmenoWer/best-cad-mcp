interface:
  display_name: "Assembly CAD Understanding"
  short_description: "Understand, validate, ground, edit, and export assembly CAD"
  default_prompt: "Use $draw-assembly-diagrams to understand, validate, visually ground, and safely edit a standards-aware AutoCAD assembly drawing with best-cad-mcp."

dependencies:
  tools:
    - type: "mcp"
      value: "best-cad-mcp"
      description: "AutoCAD MCP server with CAD-IR, semantic graph, constraints, validation, VLM grounding, safe CAD plans, drawing, query, model-private annotation, BOM/table, block, dimension, hatch, layout, and export tools."

policy:
  allow_implicit_invocation: true
