interface:
  display_name: "Assembly CAD Workflows"
  short_description: "Plan, understand, validate, ground, edit, and export CAD"
  default_prompt: "Use $draw-assembly-diagrams to understand, validate, visually ground, build CADPlans for, and safely edit a standards-aware AutoCAD assembly drawing with best-cad-mcp."

dependencies:
  tools:
    - type: "mcp"
      value: "best-cad-mcp"
      description: "AutoCAD MCP server with CAD-IR, semantic graph, constraints, validation, VLM grounding, CADPlan dry-run/execution, drawing, query, model-private annotation, BOM/table, block, dimension, hatch, layout, and export tools."

policy:
  allow_implicit_invocation: true
