interface:
  display_name: "Assembly CAD Workflows"
  short_description: "Understand, validate, ground, repair, and publish CAD"
  default_prompt: "Use $draw-assembly-diagrams to inspect CAD-IR, semantics, dimension binding, constraints, VLM grounding, modular assembly standards, CADPlan dry-runs/execution, and safe exports with best-cad-mcp."

dependencies:
  tools:
    - type: "mcp"
      value: "best-cad-mcp"
      description: "AutoCAD MCP server with CAD-IR, semantic graph, dimension binding, constraints, validation, VLM overlay/pixel grounding, CADPlan variables/dry-run/execution, drawing, query, model-private annotation, BOM/table, block, dimension, hatch, layout, and export tools."

policy:
  allow_implicit_invocation: true
